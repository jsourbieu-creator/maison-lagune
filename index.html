<style>
/* ══ Force light mode partout, même en mode nuit iOS ══ */
html {
  background: #F5F4F0 !important;
  color: #1C1B18 !important;
  color-scheme: light !important;
}
@media (prefers-color-scheme: dark) {
  html, body { background: #F5F4F0 !important; color: #1C1B18 !important; }
  nav { background: #F0EFE9 !important; }
  .kc, .sec, .grand-total { background: #FFFFFF !important; }
  .shdr, .addbar, .totrow td { background: #F5F4F0 !important; }
  input, .ni { color: #1C1B18 !important; background: transparent; }
  .ni:focus { background: #fff !important; }
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg:    #F5F4F0;
  --white: #FFFFFF;
  --s2:    #F5F4F0;
  --s3:    #ECEAE4;
  --ink:   #1C1B18;
  --ink2:  #6B6960;
  --ink3:  #ABA9A0;
  --green: #3A6B14;
  --gnbg:  #EBF4DC;
  --amber: #895408;
  --ambg:  #FDF1D6;
  --red:   #A82C2C;
  --rdbg:  #FAEAEA;
  --blue:  #1655A0;
  --blbg:  #E5F0FC;
  --bd:    rgba(28,27,24,.09);
  --bd2:   rgba(28,27,24,.15);
}

html { -webkit-font-smoothing: antialiased; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  padding-bottom: calc(4rem + env(safe-area-inset-bottom));
}

/* ── Nav ── */
nav {
  background: #F0EFE9;
  border-bottom: .5px solid var(--bd2);
  display: flex;
  align-items: center;
  padding: 0 16px;
  padding-left:  calc(16px + env(safe-area-inset-left));
  padding-right: calc(16px + env(safe-area-inset-right));
  padding-top: env(safe-area-inset-top);
  min-height: calc(52px + env(safe-area-inset-top));
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-title {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -.015em;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  border-radius: 20px;
  padding: 7px 14px;
  min-height: 34px;
  white-space: nowrap;
  -webkit-user-select: none;
  transition: opacity .12s, transform .08s;
}
.btn:active { transform: scale(.96); opacity: .75; }
.btn-light { background: var(--s3); color: var(--ink2); }
.btn-dark  { background: var(--ink); color: #fff; }

/* ── Page ── */
.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 16px 16px 0;
  padding-left:  calc(16px + env(safe-area-inset-left));
  padding-right: calc(16px + env(safe-area-inset-right));
}

/* ── KPI ── */
.kpi {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.kc {
  background: var(--white);
  border: .5px solid var(--bd);
  border-radius: 14px;
  padding: 13px 14px;
}
.kl {
  font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--ink3); margin-bottom: 5px;
}
.kv {
  font-size: 16px; font-weight: 600;
  color: var(--ink); letter-spacing: -.02em; line-height: 1;
}
.ks { font-size: 10px; color: var(--ink3); margin-top: 3px; }
.kc.gn .kv { color: var(--green) }
.kc.am .kv { color: var(--amber) }
.kc.rd .kv { color: var(--red) }
.kc.bl .kv { color: var(--blue) }

/* ── Progress ── */
.prog-wrap { margin-bottom: 16px; }
.prog-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
.prog-top .pl { font-size: 13px; font-weight: 500; color: var(--ink2); }
.prog-top .pv { font-size: 13px; font-weight: 600; color: var(--green); }
.prog-bg { height: 5px; background: rgba(28,27,24,.1); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
.prog-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width .7s cubic-bezier(.4,0,.2,1); }
.prog-sub { font-size: 11px; color: var(--ink3); }

/* ── Prêt ── */
.pret-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px 10px;
  padding: 13px 15px;
  background: var(--blbg);
  border: .5px solid rgba(22,85,160,.13);
  border-radius: 14px;
  margin-bottom: 16px;
}
.pret-row label { font-size: 13px; font-weight: 500; color: var(--blue); white-space: nowrap; }
.pret-row input {
  border: none; background: transparent;
  font-family: inherit; font-size: 16px; font-weight: 600;
  color: var(--blue); flex: 1; min-width: 100px;
  outline: none; text-align: right;
}
.pret-row input:focus {
  outline: 1.5px solid var(--blue); border-radius: 6px;
  background: var(--white); padding: 2px 6px; text-align: left;
}
.pdelta { width: 100%; font-size: 11px; font-style: italic; }
.pdelta.ok { color: var(--green) }
.pdelta.warn { color: var(--amber) }

/* ── Section ── */
.sec {
  background: var(--white);
  border: .5px solid var(--bd);
  border-radius: 16px;
  margin-bottom: 10px;
  overflow: hidden;
}

.shdr {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
  background: var(--white);
  min-height: 52px;
}
.shdr:active { background: var(--s2); }

.sarr {
  font-size: 9px; color: var(--ink3);
  transition: transform .2s ease;
  flex-shrink: 0; width: 12px;
}
.sarr.o { transform: rotate(90deg); }

.sname {
  font-size: 14px; font-weight: 600; flex: 1; min-width: 0;
  letter-spacing: -.015em; color: var(--ink); border-radius: 4px;
  /* Prevent iOS vertical text bug on contenteditable */
  word-break: normal; overflow-wrap: anywhere;
  -webkit-line-clamp: unset;
}
.sname:focus { outline: 1.5px solid var(--blue); padding: 0 4px; }

.spill {
  font-size: 11px; font-weight: 500;
  padding: 4px 10px; border-radius: 20px;
  white-space: nowrap; flex-shrink: 0;
}
.p-ok { background: var(--gnbg); color: var(--green) }
.p-pt { background: var(--ambg); color: var(--amber) }
.p-no { background: var(--rdbg); color: var(--red) }
.p-au { background: var(--s2); color: var(--ink3) }

.sdel {
  opacity: 0; transition: opacity .12s;
  border: none; background: none; color: var(--ink3);
  cursor: pointer; padding: 5px 7px; border-radius: 7px;
  font-size: 13px; flex-shrink: 0;
  min-width: 30px; min-height: 30px;
  display: flex; align-items: center; justify-content: center;
}
.sdel:hover { background: var(--rdbg); color: var(--red); }
.shdr:hover .sdel { opacity: 1; }

.sbody { border-top: .5px solid var(--bd); }
.sbody.cl { display: none; }

/* ── Table ── */
table { width: 100%; border-collapse: collapse; }

thead th {
  font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--ink3); padding: 9px 14px;
  text-align: left; border-bottom: .5px solid var(--bd);
  background: var(--s2); white-space: nowrap;
}
thead th.r { text-align: right; }

tbody td {
  padding: 11px 14px;
  border-bottom: .5px solid var(--bd);
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:active { background: var(--s2); }

.lt {
  display: block; font-size: 13px; font-weight: 500;
  color: var(--ink); line-height: 1.4; border-radius: 3px;
}
.lt:focus { outline: 1.5px solid var(--blue); padding: 0 3px; background: var(--white); }

.ln {
  display: block; font-size: 11px; color: var(--ink3);
  margin-top: 2px; font-style: italic; line-height: 1.3; border-radius: 3px;
}
.ln:focus { outline: 1px solid rgba(22,85,160,.3); font-style: normal; padding: 0 3px; background: var(--white); }
.ln:empty::before { content: 'Note…'; color: #ccc; pointer-events: none; }

.ni {
  display: block; width: 100%; text-align: right;
  border: .5px solid transparent; border-radius: 7px;
  padding: 6px 7px; font-family: inherit;
  font-size: 13px; font-weight: 500; background: transparent;
  color: var(--ink); -webkit-appearance: none; min-height: 36px;
  transition: border-color .1s, background .1s;
}
.ni:hover { border-color: var(--bd2); background: var(--s2); }
.ni:focus { outline: none; border-color: var(--blue); background: var(--white); }

.rc {
  font-size: 13px; font-weight: 600; text-align: right;
  padding: 11px 14px; vertical-align: middle; white-space: nowrap;
}
.ok { color: var(--green) }
.pt { color: var(--amber) }
.no { color: var(--red) }

.totrow td, .totrow .rc {
  background: var(--s2); font-weight: 600;
  border-top: .5px solid var(--bd2) !important;
  border-bottom: none !important;
}
.tl {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em; color: var(--ink2);
}

.db {
  opacity: 0; transition: opacity .1s;
  border: none; background: none; color: var(--ink3);
  font-size: 13px; cursor: pointer;
  padding: 4px 6px; border-radius: 5px;
  min-width: 26px; min-height: 26px;
  display: flex; align-items: center; justify-content: center;
}
.db:hover { background: var(--rdbg); color: var(--red); }
tr:hover .db { opacity: 1; }

.addbar {
  padding: 10px 14px;
  border-top: .5px solid var(--bd);
  background: var(--s2);
}
.btn-add {
  width: 100%; border-radius: 10px;
  min-height: 42px; font-size: 13px;
  background: var(--s3); color: var(--ink2);
  border: none; font-family: inherit; font-weight: 500;
  cursor: pointer; transition: opacity .12s, transform .08s;
}
.btn-add:active { transform: scale(.98); opacity: .8; }

/* ── Grand total ── */
.grand-total {
  background: var(--white);
  border: .5px solid var(--bd2);
  border-radius: 16px;
  padding: 18px 16px;
  margin-bottom: 8px;
}
.gt-grid { display: grid; grid-template-columns: repeat(3,1fr); }
.gt-item { padding-right: 18px; }
.gt-item + .gt-item { padding: 0 18px; border-left: .5px solid var(--bd); }
.gt-item:last-child { padding: 0 0 0 18px; }
.gtl { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; color: var(--ink3); margin-bottom: 6px; }
.gtv { font-size: 18px; font-weight: 600; color: var(--ink); letter-spacing: -.025em; line-height: 1; }
.gtv.g { color: var(--green) }
.gtv.a { color: var(--amber) }
.gt-note { margin-top: 14px; padding-top: 12px; border-top: .5px solid var(--bd); font-size: 11px; color: var(--ink3); font-style: italic; line-height: 1.5; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(1.25rem + env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%) translateY(8px);
  background: var(--ink); color: #fff;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, transform .2s;
  z-index: 999;
  box-shadow: 0 4px 20px rgba(0,0,0,.18);
  white-space: nowrap;
}
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

.hint { font-size: 11px; color: var(--ink3); text-align: center; padding: 8px 0 16px; }

/* ── Colonnes masquées sur mobile ── */
@media (max-width: 580px) {
  /* Cache Budget et colonne suppr sur mobile — table tient en 3 col */
  .col-budget, .col-del { display: none; }
  .kpi { grid-template-columns: 1fr 1fr; }
  .kc.wide { grid-column: 1 / -1; }
  .kv { font-size: 17px; }
  nav { gap: 8px; }
  .gt-grid { grid-template-columns: 1fr; }
  .gt-item, .gt-item + .gt-item, .gt-item:last-child {
    padding: 12px 0; border-left: none;
    border-bottom: .5px solid var(--bd);
  }
  .gt-item:last-child { border-bottom: none; }
  .gtv { font-size: 17px; }
  .grand-total { padding: 14px 16px; }
}
</style>

</head>
<body>

<nav>
  <div class="nav-title">Suivi chantier</div>
  <button class="btn btn-light" onclick="addSec()" style="font-size:12px;padding:6px 12px">+ Section</button>
  <button class="btn btn-dark" onclick="dl()" style="font-size:12px;padding:6px 12px">⬇ Enregistrer</button>
</nav>

<div class="page">

  <div class="kpi">
    <div class="kc wide"><div class="kl">Budget total</div><div class="kv" id="kt">—</div></div>
    <div class="kc gn"><div class="kl">Déjà réglé</div><div class="kv" id="kp">—</div></div>
    <div class="kc am"><div class="kl">Reste à payer</div><div class="kv" id="kr">—</div></div>
    <div class="kc bl"><div class="kl">Enveloppe prêt</div><div class="kv" id="ke">—</div></div>
    <div class="kc rd"><div class="kl">Fonds propres</div><div class="kv" id="kf">—</div><div class="ks" id="kfs"></div></div>
  </div>

  <div class="prog-wrap">
    <div class="prog-top"><span class="pl">Avancement global</span><span class="pv" id="pp">—</span></div>
    <div class="prog-bg"><div class="prog-fill" id="pf" style="width:0%"></div></div>
    <div class="prog-sub" id="ps">—</div>
  </div>

  <div class="pret-row">
    <label for="pret">Enveloppe prêt (CIC)</label>
    <input id="pret" type="number" step="0.01" inputmode="decimal" oninput="calc()">
    <span class="pdelta" id="pd"></span>
  </div>

  <div id="secs"></div>

  <div class="grand-total">
    <div class="gt-grid">
      <div class="gt-item"><div class="gtl">Budget total</div><div class="gtv" id="gb">—</div></div>
      <div class="gt-item"><div class="gtl">Total payé</div><div class="gtv g" id="gp">—</div></div>
      <div class="gt-item"><div class="gtl">Reste à payer</div><div class="gtv a" id="gr">—</div></div>
    </div>
    <div class="gt-note" id="gn"></div>
  </div>

  <p class="hint">Appuyez sur un libellé ou montant pour modifier · Sauvegarde auto</p>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='chantier_v10';
let D=JSON.parse(document.getElementById('D').textContent);
try{const s=localStorage.getItem(KEY);if(s)D=JSON.parse(s);}catch(e){}

const fr2=n=>new Intl.NumberFormat('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n)+'\u202f€';
const fr0=n=>new Intl.NumberFormat('fr-FR').format(Math.round(Math.abs(n)))+'\u202f€';
const $=id=>document.getElementById(id);
const txt=(id,v)=>{const e=$(id);if(e)e.textContent=v;};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function calc(){
  let tB=0,tP=0;
  D.sections.forEach((s,si)=>{
    let sB=0,sP=0;
    s.rows.forEach((r,ri)=>{
      const bi=$('b_'+si+'_'+ri),pi=$('p_'+si+'_'+ri);
      const b=bi?+bi.value||0:r.b, p=pi?+pi.value||0:r.p;
      r.b=b;r.p=p;
      const re=b-p;sB+=b;sP+=p;
      const rc=$('r_'+si+'_'+ri);
      if(rc){rc.textContent=fr2(re);rc.className='rc '+(re<=0?'ok':p>0?'pt':'no');}
    });
    tB+=sB;tP+=sP;
    const sR=sB-sP;
    txt('sb_'+si,fr2(sB));txt('sp_'+si,fr2(sP));
    const sr=$('sr_'+si);
    if(sr){sr.textContent=fr2(sR);sr.className='rc '+(sR<=0?'ok':sP>0?'pt':'no');}
    const sp=$('spi_'+si);
    if(sp){sp.textContent=sR<=0?'Soldé':sP>0?'Reste '+fr0(sR):'Non payé';sp.className='spill '+(sR<=0?'p-ok':sP>0?'p-pt':'p-no');}
  });
  const tR=tB-tP,pret=+$('pret').value||0,prop=tB-pret,pct=tB>0?tP/tB*100:0;
  txt('kt',fr0(tB));txt('kp',fr0(tP));txt('kr',fr0(tR));
  txt('ke',fr0(pret));txt('kf',fr0(Math.abs(prop)));
  txt('kfs',prop>0?'hors prêt':'excédent');
  txt('pp',pct.toFixed(1)+'\u202f%');
  const pf=$('pf');if(pf)pf.style.width=Math.min(pct,100)+'%';
  txt('ps',fr0(tP)+' réglés sur '+fr0(tB));
  const pd=$('pd');
  if(pd){pd.textContent=prop>0?'⚠ dépassement de '+fr0(prop)+' sur fonds propres':'✓ prêt suffisant — excédent '+fr0(Math.abs(prop));pd.className='pdelta '+(prop<=0?'ok':'warn');}
  txt('gb',fr2(tB));txt('gp',fr2(tP));txt('gr',fr2(tR));
  txt('gn','Enveloppe prêt\u202f: '+fr0(pret)+(prop>0?' · Fonds propres nécessaires\u202f: '+fr0(prop):''));
  D.pret=pret;save();
}

function save(){try{localStorage.setItem(KEY,JSON.stringify(D));}catch(e){}}

function render(){
  $('pret').value=D.pret;
  const c=$('secs');c.innerHTML='';
  D.sections.forEach((s,si)=>c.appendChild(buildSec(s,si)));
  calc();
}

function buildSec(s,si){
  const d=document.createElement('div');
  d.className='sec';d.id='S'+si;
  const rows=s.rows.map((r,ri)=>`<tr id="R${si}_${ri}">
<td><span class="lt" contenteditable="true" spellcheck="false" onblur="D.sections[${si}].rows[${ri}].l=this.textContent;save()">${esc(r.l)}</span><span class="ln" contenteditable="true" spellcheck="false" onblur="D.sections[${si}].rows[${ri}].n=this.textContent;save()">${esc(r.n)}</span></td>
<td class="col-budget"><input class="ni" id="b_${si}_${ri}" type="number" step="0.01" min="0" inputmode="decimal" value="${r.b}" oninput="calc()"></td>
<td><input class="ni" id="p_${si}_${ri}" type="number" step="0.01" min="0" inputmode="decimal" value="${r.p}" oninput="calc()"></td>
<td class="rc no" id="r_${si}_${ri}">—</td>
<td class="col-del" style="text-align:center"><button class="db" onclick="delRow(${si},${ri})">✕</button></td>
</tr>`).join('');

  d.innerHTML=`
<div class="shdr" onclick="tog(${si})">
  <span class="sarr o" id="ar${si}">▶</span>
  <span class="sname" contenteditable="true" spellcheck="false" onclick="event.stopPropagation()" onblur="D.sections[${si}].name=this.textContent.trim();save()">${esc(s.name)}</span>
  <span class="spill p-au" id="spi_${si}"></span>
  <button class="sdel" onclick="event.stopPropagation();delSec(${si})">✕</button>
</div>
<div class="sbody" id="bd${si}">
  <table>
    <thead><tr>
      <th>Poste</th>
      <th class="r col-budget">Budget</th>
      <th class="r">Payé</th>
      <th class="r">Reste</th>
      <th class="col-del"></th>
    </tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr class="totrow">
      <td><span class="tl">Sous-total</span></td>
      <td class="r col-budget" id="sb_${si}">—</td>
      <td class="r" id="sp_${si}">—</td>
      <td class="rc" id="sr_${si}">—</td>
      <td class="col-del"></td>
    </tr></tfoot>
  </table>
  <div class="addbar"><button class="btn-add" onclick="addRow(${si})">+ Ajouter une ligne</button></div>
</div>`;
  return d;
}

function tog(si){$('bd'+si).classList.toggle('cl');$('ar'+si).classList.toggle('o');}
function addRow(si){D.sections[si].rows.push({l:'Nouveau poste',n:'',b:0,p:0});render();}
function delRow(si,ri){if(D.sections[si].rows.length<2){toast('Au moins 1 ligne requise.');return;}D.sections[si].rows.splice(ri,1);render();}
function addSec(){D.sections.push({name:'Nouvelle section',rows:[{l:'Nouveau poste',n:'',b:0,p:0}]});render();}
function delSec(si){if(!confirm('Supprimer "'+D.sections[si].name+'" ?'))return;D.sections.splice(si,1);render();}

function dl(){
  D.sections.forEach((s,si)=>{
    const sn=document.querySelector('#S'+si+' .sname');
    if(sn)s.name=sn.textContent.trim();
    s.rows.forEach((r,ri)=>{
      const lt=document.querySelector('#R'+si+'_'+ri+' .lt');
      const ln=document.querySelector('#R'+si+'_'+ri+' .ln');
      const bi=$('b_'+si+'_'+ri),pi=$('p_'+si+'_'+ri);
      if(lt)r.l=lt.textContent;if(ln)r.n=ln.textContent;
      if(bi)r.b=+bi.value||0;if(pi)r.p=+pi.value||0;
    });
  });
  D.pret=+$('pret').value||0;
  const tag=$('D'),orig=tag.textContent;
  tag.textContent=JSON.stringify(D);
  const html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  tag.textContent=orig;
  try{
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='index.html';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
    toast('Fichier enregistré ✓');
  }catch(e){toast('Erreur : '+e.message);}
}

function toast(msg){
  const el=$('toast');el.textContent=msg;
  el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),2800);
}

render();
</script>

</body>
</html>
